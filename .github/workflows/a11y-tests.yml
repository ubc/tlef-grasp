name: Accessibility Tests

# Playwright + axe accessibility tests. This workflow stays separate from unit
# and E2E workflows, but uses the same local docker-simple-saml IdP as E2E so
# authenticated page and modal scans run in CI.

on:
  push:
    # `testing` is here so this branch gets CI feedback while the workflows are
    # being iterated on — remove it before merging to main.
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  a11y:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      IDP_REPO: https://github.com/ubc/docker-simple-saml.git
      IDP_REF: main
      IDP_DIR: ${{ github.workspace }}/../docker-simple-saml
      TLEF_GRASP_PORT: 8052
      NODE_ENV: test
      SESSION_SECRET: ci-a11y-secret
      MONGODB_URI: mongodb://localhost:27017
      MONGODB_DB_NAME: tlef_grasp_a11y
      SAML_ENVIRONMENT: LOCAL
      SAML_ISSUER: http://localhost:8052
      SAML_CALLBACK_URL: http://localhost:8052/auth/saml/callback
      SAML_CERT_PATH: ${{ github.workspace }}/../docker-simple-saml/cert/server.crt
      E2E_SAML: '1'
      E2E_USERNAME: faculty
      E2E_PASSWORD: faculty
      UBC_API_USE_MOCK: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Clone docker-simple-saml IdP
        run: git clone --depth 1 --branch "$IDP_REF" "$IDP_REPO" "$IDP_DIR"

      - name: Publish the IdP on :8080
        run: |
          cat > "$IDP_DIR/docker-compose.override.yml" <<'YAML'
          services:
            saml-idp:
              ports:
                - '8080:80'
          YAML

      - name: Start the IdP
        working-directory: ${{ env.IDP_DIR }}
        run: docker compose up -d --build

      - name: Wait for the IdP to be ready
        run: |
          for i in $(seq 1 40); do
            if curl -sSf -o /dev/null "http://localhost:8080/simplesaml/saml2/idp/metadata.php"; then
              echo "IdP is up"; exit 0
            fi
            echo "waiting for IdP ($i)..."; sleep 3
          done
          echo "IdP did not become ready"; exit 1

      - name: Make the IdP private key readable by Apache/PHP
        working-directory: ${{ env.IDP_DIR }}
        run: docker compose exec -T saml-idp chmod 0644 /var/www/simplesamlphp/cert/server.pem

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@ubc'

      - name: Install root dependencies
        run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install client dependencies
        run: npm install --prefix client

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run accessibility tests
        run: npm run test:a11y

      - name: Dump IdP logs on failure
        if: failure()
        working-directory: ${{ env.IDP_DIR }}
        run: docker compose logs --no-color || true

      - name: Upload accessibility report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report
          path: playwright-report-a11y/
          retention-days: 14

      - name: Upload traces / videos / screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-test-results
          path: test-results/
          retention-days: 14

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Sections - GRASP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:ital,wdth,wght@0,75..100,300..800;1,75..100,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles/navigation.css">
    <link rel="stylesheet" href="styles/users.css">
</head>
<body>
    <div class="app-container">
        <!-- Main Content Area -->
        <main class="main-content">
            <div class="content-wrapper">
                <div class="users-header">
                    <h1>My Sections</h1>
                </div>

                <!-- Add Section Form -->
                <section class="users-section" id="add-section-container" style="display: none;">
                    <div class="section-header">
                        <h2>
                            <i class="fas fa-plus-circle"></i>
                            Add Section
                        </h2>
                        <p class="section-description">Add new sections to this course.</p>
                    </div>
                    
                    <form id="add-section-form" class="filters-container" style="flex-direction: column; align-items: stretch; gap: 16px;">
                        <div class="filter-group" style="flex-direction: column; align-items: flex-start;">
                            <label for="add-academic-period">Academic Period</label>
                            <select id="add-academic-period" required style="width: 100%;">
                                <option value="">Loading...</option>
                            </select>
                        </div>
                        
                        <div class="filter-group" style="flex-direction: column; align-items: flex-start;">
                            <label for="add-sections">Select Sections (Hold ⌘/Ctrl for multiple)</label>
                            <select id="add-sections" multiple required disabled style="width: 100%; height: auto; min-height: 80px; padding: 8px;">
                                <option value="">Select academic period first</option>
                            </select>
                            <small id="add-sections-help" style="color: #6c757d; font-size: 12px; margin-top: 4px;"></small>
                        </div>

                        <div class="filter-group" style="flex-direction: column; align-items: flex-start;">
                            <label class="checkbox-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                <input type="checkbox" id="add-sync-students" checked>
                                Sync Students Immediately
                            </label>
                        </div>
                        
                        <div class="filter-group" style="justify-content: flex-end;">
                            <button type="submit" id="add-section-btn" class="btn btn-primary" disabled style="height: 38px;">
                                <i class="fas fa-plus"></i> Add Section(s)
                            </button>
                        </div>
                    </form>
                </section>

                <!-- Sections List Section -->
                <section class="users-section">
                    <div class="section-header">
                        <h2>
                            <i class="fas fa-layer-group"></i>
                            Course Sections
                        </h2>
                    </div>

                    <div class="users-container">
                        <div class="loading" id="sections-loading">
                            <i class="fas fa-spinner fa-spin"></i>
                            <span>Loading sections...</span>
                        </div>
                        
                        <div class="table-wrapper" id="sections-table-wrapper" style="display: none;">
                            <table class="users-table">
                                <thead>
                                    <tr>
                                        <th>Academic Period</th>
                                        <th>Section Number</th>
                                        <th class="actions-column">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="sections-list">
                                    <!-- Sections will be populated here -->
                                </tbody>
                            </table>
                        </div>

                        <div class="empty-state" id="sections-empty" style="display: none;">
                            <i class="fas fa-layer-group"></i>
                            <p>You don't own any course sections.</p>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Confirmation Modal -->
    <div class="modal" id="confirm-modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Confirm Recycle</h3>
                <button class="modal-close" id="modal-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <p id="modal-message">Are you sure you want to detach all students from this section?</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
                <button class="btn btn-primary" id="modal-confirm" style="background-color: #e74c3c;">Recycle</button>
            </div>
        </div>
    </div>

    <script src="scripts/navigation.js"></script>
    <script src="scripts/my-sections.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - GRASP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:ital,wdth,wght@0,75..100,300..800;1,75..100,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/navigation.css">
    <link rel="stylesheet" href="styles/users.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">

        <!-- Main Content Area -->
        <main class="main-content">
            <div class="content-wrapper">
                <div class="users-header">
                    <h1>Course Users</h1>
                </div>

                <!-- Course Users Section -->
                <section class="users-section">
                    <div class="section-header">
                        <h2>
                            <i class="fas fa-users"></i>
                            Users in Course
                        </h2>
                    </div>

                    <!-- Filters -->
                    <div class="filters-container">
                        <div class="filter-group">
                            <label for="course-section-filter">Filter by Section:</label>
                            <select id="course-section-filter">
                                <option value="all">All Sections</option>
                            </select>
                        </div>
                    </div>

                    <div class="users-container">
                        <div class="loading" id="course-users-loading">
                            <i class="fas fa-spinner fa-spin"></i>
                            <span>Loading users...</span>
                        </div>
                        <div class="table-wrapper" id="course-users-table-wrapper" style="display: none;">
                            <table class="users-table">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Role</th>
                                        <th>Sections</th>
                                        <th class="actions-column">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="course-users-list">
                                    <!-- Course users will be populated here -->
                                </tbody>
                            </table>
                        </div>
                        
                        <!-- Pagination -->
                        <div class="pagination-container" id="users-pagination" style="display: none;">
                            <button class="btn btn-secondary btn-sm" id="prev-page"><i class="fas fa-chevron-left"></i></button>
                            <span class="page-info" id="page-info">Page 1 of 1</span>
                            <button class="btn btn-secondary btn-sm" id="next-page"><i class="fas fa-chevron-right"></i></button>
                        </div>

                        <div class="empty-state" id="course-users-empty" style="display: none;">
                            <i class="fas fa-users"></i>
                            <p>No users found in this course.</p>
                        </div>
                    </div>
                </section>


            </div>
        </main>
    </div>

    <!-- Confirmation Modal -->
    <div class="modal" id="confirm-modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Confirm Action</h3>
                <button class="modal-close" id="modal-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <p id="modal-message">Are you sure you want to proceed?</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
                <button class="btn btn-primary" id="modal-confirm">Confirm</button>
            </div>
        </div>
    </div>

    <script src="scripts/navigation.js"></script>
    <script src="scripts/users.js"></script>
</body>
</html>
